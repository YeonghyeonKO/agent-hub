# -- Instance name (required). Used for resource naming and ingress hostname.
instanceName: ""

backend:
  image:
    repository: dk02315/agent-hub-backend
    tag: "0.9.5"
    pullPolicy: IfNotPresent
  replicaCount: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 10
  port: 8000
  # -- Extra environment variables for the backend
  extraEnv: []

frontend:
  image:
    repository: dk02315/agent-hub-frontend
    tag: "0.9.5"
    pullPolicy: IfNotPresent
  replicaCount: 2
  port: 80
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

ingress:
  enabled: true
  domain: aipp02.skhynix.com
  tlsDisable: false          # set true to disable TLS (e.g. SSL terminated at L7 LB)
  tlsSecretName: ""          # TLS secret name (leave empty for default cert)
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

# -- Keycloak SSO configuration
keycloak:
  enabled: false
  serverUrl: ""            # e.g. https://keycloak.skhynix.com
  realm: ""                # e.g. hynix
  clientId: ""             # e.g. agent-hub
  clientSecret: ""         # ignored if existingSecret is set
  employeeClaim: empno     # JWT claim for employee number (7-digit)
  existingSecret: ""
  existingSecretKeys:
    clientSecret: client-secret

# -- SSL CA certificate for Keycloak (corporate PKI)
ssl:
  enabled: false
  caCert: ""               # inline PEM certificate
  existingConfigMap: ""    # use existing ConfigMap instead
  existingSecret: ""       # use existing Secret instead
  key: ca.crt              # key name in ConfigMap/Secret

# -- External PostgreSQL (recommended for production)
postgresql:
  # -- When true, deploy a PostgreSQL StatefulSet. When false, use external DB.
  internal: false
  host: ""                 # e.g. postgresql.database.svc.cluster.local
  port: 5432
  database: agenthub
  username: agenthub
  password: ""             # ignored if existingSecret is set
  existingSecret: ""
  existingSecretKey: postgresql-password
  # -- Internal PostgreSQL settings (only when internal=true)
  storage:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

# -- Application settings
app:
  devMode: true            # skip Keycloak auth, use dev admin user (set false when keycloak.enabled=true)
  uploadDir: /data/uploads
  corsOrigins: ""          # auto-derived from ingress if empty
  storage: 5Gi
  storageClass: ""

# -- Autoscaling for backend
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilization: 70

# -- Private registry credentials (creates imagePullSecret automatically)
imageRegistry:
  enabled: false
  server: ""               # e.g. harbor.company.com
  username: ""
  password: ""

imagePullSecrets: []       # use this OR imageRegistry, not both
