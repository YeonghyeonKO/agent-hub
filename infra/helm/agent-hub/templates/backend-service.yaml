apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-hub.fullname" . }}-backend
  labels:
    {{- include "agent-hub.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
      protocol: TCP
  selector:
    {{- include "agent-hub.backendSelectorLabels" . | nindent 4 }}
