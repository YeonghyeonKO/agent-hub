apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-hub.fullname" . }}-backend
  labels:
    {{- include "agent-hub.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: 8000
      protocol: TCP
  selector:
    {{- include "agent-hub.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
