apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-hub.fullname" . }}-frontend
  labels:
    {{- include "agent-hub.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: 80
      protocol: TCP
  selector:
    {{- include "agent-hub.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
