{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "agent-hub.fullname" . }}
  labels:
    {{- include "agent-hub.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  {{- if not .Values.ingress.tlsDisable }}
  tls:
    - hosts:
        - {{ include "agent-hub.host" . }}
      {{- if .Values.ingress.tlsSecretName }}
      secretName: {{ .Values.ingress.tlsSecretName }}
      {{- end }}
  {{- end }}
  rules:
    - host: {{ include "agent-hub.host" . }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "agent-hub.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "agent-hub.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.port }}
{{- end }}
