apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent-hub.fullname" . }}-config
  labels:
    {{- include "agent-hub.labels" . | nindent 4 }}
data:
  DEV_MODE: {{ .Values.app.devMode | quote }}
  UPLOAD_DIR: {{ .Values.app.uploadDir | quote }}
  CORS_ORIGINS: {{ .Values.app.corsOrigins | default (printf "https://%s" (include "agent-hub.host" .)) | quote }}
  LANGFLOW_URL_PATTERN: {{ .Values.app.langflowUrlPattern | default "" | quote }}
  LANGFLOW_VERIFY_SSL: {{ .Values.app.langflowVerifySsl | default false | quote }}
  {{- if .Values.keycloak.enabled }}
  KEYCLOAK_URL: {{ .Values.keycloak.serverUrl | quote }}
  KEYCLOAK_REALM: {{ .Values.keycloak.realm | quote }}
  KEYCLOAK_CLIENT_ID: {{ .Values.keycloak.clientId | quote }}
  KEYCLOAK_EMPLOYEE_CLAIM: {{ .Values.keycloak.employeeClaim | quote }}
  {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent-hub.fullname" . }}-nginx
  labels:
    {{- include "agent-hub.labels" . | nindent 4 }}
data:
  nginx.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index AgentHub.html;

        {{- if .Values.keycloak.enabled }}
        # Inject Keycloak config for frontend OIDC
        sub_filter '</head>' '<script>window.__AGENTHUB_KEYCLOAK_URL="{{ .Values.keycloak.serverUrl }}";window.__AGENTHUB_KEYCLOAK_REALM="{{ .Values.keycloak.realm }}";window.__AGENTHUB_KEYCLOAK_CLIENT_ID="{{ .Values.keycloak.clientId }}";</script></head>';
        sub_filter_once on;
        {{- end }}

        location / {
            try_files $uri $uri/ /AgentHub.html;
        }

        location /api/ {
            proxy_pass http://{{ include "agent-hub.fullname" . }}-backend:{{ .Values.backend.port }};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 10m;
        }

        location /health {
            proxy_pass http://{{ include "agent-hub.fullname" . }}-backend:{{ .Values.backend.port }}/health;
        }
    }
