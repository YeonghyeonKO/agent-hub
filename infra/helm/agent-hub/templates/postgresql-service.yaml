{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-hub.fullname" . }}-postgresql
  labels:
    {{- include "agent-hub.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    {{- include "agent-hub.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
{{- end }}
