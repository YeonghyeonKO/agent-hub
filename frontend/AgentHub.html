<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="icon" type="image/png" href="assets/favicon.png"/>
<title>AgentHub · Langflow Component & Flow</title>
<link rel="stylesheet" href="styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/marked@15.0.4/marked.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="auth.jsx"></script>
<script type="text/babel" src="i18n.jsx"></script>
<script type="text/babel" src="api.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="home.jsx"></script>
<script type="text/babel" src="component-detail.jsx"></script>
<script type="text/babel" src="flow-detail.jsx"></script>
<script type="text/babel" src="image-upload.jsx"></script>
<script type="text/babel" src="upload-modal.jsx"></script>
<script type="text/babel" src="code-diff.jsx"></script>
<script type="text/babel" src="notifications-menu.jsx"></script>
<script type="text/babel" src="admin.jsx"></script>
<script type="text/babel" src="extra-pages.jsx"></script>
<script type="text/babel" src="boards.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#ea725d",
  "density": "comfortable",
  "showTrophies": true,
  "showSeasonBanner": true,
  "role": "user"
}/*EDITMODE-END*/;

function DetailOverlay({ detail, onClose, onOpenComponent }) {
  React.useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => { document.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
  }, [onClose]);

  return (
    <div className="detail-overlay-backdrop" onClick={onClose}>
      <div className="detail-overlay" onClick={e => e.stopPropagation()}>
        <div className="detail-overlay-header">
          <button className="btn btn-ghost btn-sm" onClick={onClose} style={{display: 'flex', alignItems: 'center', gap: 6}}>
            <Icons.ArrowRight size={14} style={{transform: 'rotate(180deg)'}}/> <span>{useI18n().t('nav_home')}</span>
          </button>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>
            <Icons.X size={16}/>
          </button>
        </div>
        <div className="detail-overlay-body">
          {detail.type === 'flow'
            ? <FlowDetail component={detail.component} onBack={onClose} onOpenComponent={onOpenComponent}/>
            : <ComponentDetail component={detail.component} onBack={onClose}/>
          }
        </div>
      </div>
    </div>
  );
}

// Hash-based routing with component detail support
const ROUTES = ['home', 'mine', 'ranking', 'notice', 'voc', 'guide', 'admin'];
function getRouteFromHash() {
  const parts = window.location.hash.replace('#/', '').split('/');
  const page = parts[0] || 'home';
  if (page === 'notice' && parts[1]) return { name: 'notice', noticeId: parts[1] };
  if (page === 'voc' && parts[1]) return { name: 'voc', vocId: parts[1] };
  if (ROUTES.includes(page)) return { name: page };
  return { name: 'home' };
}
function getDetailFromHash() {
  const parts = window.location.hash.replace('#/', '').split('/');
  if ((parts[0] === 'component' || parts[0] === 'flow') && parts[1]) {
    return { id: parts[1], type: parts[0] };
  }
  return null;
}

function App() {
  const [route, setRoute] = React.useState(getRouteFromHash());
  const [showUpload, setShowUpload] = React.useState(false);
  const [uploadPrefill, setUploadPrefill] = React.useState(null);
  const [detailModal, setDetailModal] = React.useState(null);

  // Open detail from URL on load (e.g. #/component/{uuid})
  React.useEffect(() => {
    const d = getDetailFromHash();
    if (d && d.id) {
      api.components.get(d.id)
        .then(c => setDetailModal({ component: apiToCard(c), type: d.type }))
        .catch(() => {});
    }
  }, []);
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [userRole, setUserRole] = React.useState('user');
  const [userName, setUserName] = React.useState('');
  const [authReady, setAuthReady] = React.useState(false);

  // Initialize auth config + handle OIDC callback + fetch user
  React.useEffect(() => {
    (async () => {
      await auth.init();
      await auth.handleCallback();
      try {
        const u = await api.users.me();
        setUserRole(u.role || 'user');
        setUserName(u.name || '');
      } catch (e) {
        // If not dev mode and not logged in, redirect to Keycloak
        if (!AUTH_CONFIG.devMode && !auth.isLoggedIn()) {
          auth.login();
          return;
        }
      }
      setAuthReady(true);
    })();
  }, []);
  const [lang, setLang] = React.useState('ko');
  const toggleLang = () => {
    const next = lang === 'ko' ? 'en' : 'ko';
    setLang(next);
    window.__agenthub_lang = next;
    window.dispatchEvent(new Event('langchange'));
  };

  // Sync route → hash
  React.useEffect(() => {
    let hash = '#/' + route.name;
    if (route.name === 'notice' && route.noticeId) hash += '/' + route.noticeId;
    if (route.name === 'voc' && route.vocId) hash += '/' + route.vocId;
    if (window.location.hash !== hash) window.history.pushState(null, '', hash);
  }, [route.name, route.noticeId, route.vocId]);

  // Listen for browser back/forward
  React.useEffect(() => {
    const onPop = () => {
      const d = getDetailFromHash();
      if (d && d.id) {
        api.components.get(d.id)
          .then(c => setDetailModal({ component: apiToCard(c), type: d.type }))
          .catch(() => setDetailModal(null));
      } else {
        setDetailModal(null);
        setRoute(getRouteFromHash());
      }
    };
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);

  // Apply tweaks to CSS vars
  React.useEffect(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accent);
    // derive accent variants
    const tinted = tweaks.accent + '14';
    document.documentElement.style.setProperty('--accent-bg', tinted);
    document.documentElement.style.setProperty('--accent-fg', tweaks.accent);
    // darken accent for hover by overlaying black
    document.documentElement.style.setProperty('--accent-hover', `color-mix(in srgb, ${tweaks.accent} 80%, black)`);
    if (tweaks.density === 'compact') {
      document.body.style.fontSize = '13px';
    } else {
      document.body.style.fontSize = '14px';
    }
  }, [tweaks]);

  const goHome = () => setRoute({ name: 'home' });
  const openComponent = (c) => {
    const type = c.type === 'json' ? 'flow' : 'component';
    if (c.id && String(c.id).includes('-') && c.version === undefined) {
      api.components.get(c.id).then(full => {
        const card = apiToCard(full);
        setDetailModal({ component: card, type });
        window.history.pushState(null, '', `#/${type}/${c.id}`);
      }).catch(() => { setDetailModal({ component: c, type }); });
    } else {
      setDetailModal({ component: c, type });
      if (c.id) window.history.pushState(null, '', `#/${type}/${c.id}`);
    }
  };
  const closeDetail = () => {
    setDetailModal(null);
    window.history.pushState(null, '', `#/${route.name}`);
    window.dispatchEvent(new Event('agenthub:reload'));
  };
  const goAdmin = () => setRoute({ name: 'admin' });
  const goMine = () => setRoute({ name: 'mine' });
  const goRanking = () => setRoute({ name: 'ranking' });
  const goGuide = () => setRoute({ name: 'guide' });
  const goNotice = (noticeId) => setRoute({ name: 'notice', noticeId: (noticeId && typeof noticeId === 'string') ? noticeId : undefined });
  const goVoc = () => setRoute({ name: 'voc' });
  const handleSearch = (q) => {
    window.__agenthub_search_query = q;
    if (route.name === 'home') {
      // Already on Home — fire immediately
      window.dispatchEvent(new Event('agenthub:search'));
    } else {
      setRoute({ name: 'home' });
      setTimeout(() => window.dispatchEvent(new Event('agenthub:search')), 150);
    }
  };

  return (
    <div data-screen-label={`AgentHub · ${route.name}`}>
      <Topbar
        route={route}
        onGoHome={goHome}
        onGoAdmin={goAdmin}
        onGoMine={goMine}
        onGoRanking={goRanking}
        onGoGuide={goGuide}
        onGoNotice={goNotice}
        onGoVoc={goVoc}
        onOpenUpload={() => setShowUpload(true)}
        onToggleLang={toggleLang}
        onSearch={handleSearch}
        lang={lang}
        role={userRole}
        userName={userName}
      />

      {route.name === 'home' && (
        <Home
          onOpenComponent={openComponent}
          onOpenUpload={() => setShowUpload(true)}
          onGoAdmin={goAdmin}
          onGoNotice={goNotice}
        />
      )}
      {route.name === 'admin' && (
        <AdminDashboard onBack={goHome} userRole={userRole} onOpenComponent={openComponent}/>
      )}
      {route.name === 'mine' && (
        <MyAssetsPage onOpenComponent={openComponent} onOpenUpload={(prefill) => { setUploadPrefill(prefill || null); setShowUpload(true); }}/>
      )}
      {route.name === 'ranking' && (
        <RankingPage onOpenComponent={openComponent}/>
      )}
      {route.name === 'guide' && (
        <GuidePage/>
      )}
      {route.name === 'notice' && (
        <NoticePage initialNoticeId={route.noticeId}/>
      )}
      {route.name === 'voc' && (
        <VocPage initialVocId={route.vocId}/>
      )}

      {detailModal && <DetailOverlay detail={detailModal} onClose={closeDetail} onOpenComponent={openComponent}/>}
      {showUpload && <UploadModal onClose={() => { setShowUpload(false); setUploadPrefill(null); }} prefill={uploadPrefill}/>}

      <footer className="page-footer">
        <div className="page-footer-inner">
          <div className="page-footer-mark">
            <span className="page-footer-logo">SK<span style={{color: 'var(--accent-fg)'}}>hynix</span></span>
            <span className="page-footer-divider"/>
            <span className="page-footer-team">{(useI18n().t('footer_team'))}</span>
          </div>
          <div className="page-footer-meta">
            <span>© 2026 SK hynix Inc.</span>
            <span className="page-footer-dot">·</span>
            <span className="page-footer-contact">
              {(useI18n().t('footer_contact'))}
              <span className="page-footer-tooltip">AI/Data Platform 고영현TL</span>
            </span>
          </div>
        </div>
      </footer>

    </div>
  );
}

function Topbar({ route, onGoHome, onGoAdmin, onGoMine, onGoRanking, onGoGuide, onGoNotice, onGoVoc, onOpenUpload, onToggleLang, onSearch, lang, role, userName }) {
  const { t } = useI18n();
  const [mobileMenu, setMobileMenu] = React.useState(false);
  const [searchVal, setSearchVal] = React.useState('');
  const navClick = (fn) => { fn(); setMobileMenu(false); };
  const handleSearch = () => { if (searchVal.trim() && onSearch) { onSearch(searchVal.trim()); setSearchVal(''); } };
  return (
    <div className="topbar">
      <button className="hamburger-btn" onClick={() => setMobileMenu(!mobileMenu)}>
        {mobileMenu ? <Icons.X size={18}/> : <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>}
      </button>
      <div className="brand" onClick={onGoHome}>
        <div className="brand-mark"/>
        <span><span style={{color: 'var(--accent)'}}>AgentH</span>ub</span>
        <img src="assets/sk-ribbon.png" alt="" style={{width: 20, height: 20, marginLeft: -4}}/>
      </div>
      <div className={`nav-links ${mobileMenu ? 'mobile-open' : ''}`}>
        <a className={`nav-link ${route.name === 'home' ? 'active' : ''}`} onClick={() => navClick(onGoHome)}>{t('nav_home')}</a>
        <a className={`nav-link ${route.name === 'mine' ? 'active' : ''}`} onClick={() => navClick(onGoMine)}>{t('nav_mine')}</a>
        <a className={`nav-link ${route.name === 'ranking' ? 'active' : ''}`} onClick={() => navClick(onGoRanking)}>{t('nav_ranking')}</a>
        <a className={`nav-link ${route.name === 'notice' ? 'active' : ''}`} onClick={() => navClick(onGoNotice)}>{t('nav_notice')}</a>
        <a className={`nav-link ${route.name === 'voc' ? 'active' : ''}`} onClick={() => navClick(onGoVoc)}>{t('nav_voc')}</a>
        <a className={`nav-link ${route.name === 'guide' ? 'active' : ''}`} onClick={() => navClick(onGoGuide)}>{t('nav_guide')}</a>
        {['admin', 'manager', 'reviewer'].includes(role) && <a className={`nav-link ${route.name === 'admin' ? 'active' : ''}`} onClick={() => navClick(onGoAdmin)}>{t('nav_admin')}</a>}
      </div>
      <div className="nav-spacer"/>
      <div className="nav-search">
        <Icons.Search size={13}/>
        <input placeholder={t('search_placeholder')} value={searchVal} onChange={e => setSearchVal(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') handleSearch(); }}/>
      </div>
      <button className="btn btn-secondary btn-sm topbar-submit" onClick={onOpenUpload}>
        <Icons.Plus size={12}/> <span className="topbar-submit-label">{t('btn_submit')}</span>
      </button>
      <button className="btn btn-ghost topbar-lang" onClick={onToggleLang} title="한국어/English" style={{fontSize: 15, padding: '4px 8px'}}>
        {lang === 'en' ? '🇺🇸' : '🇰🇷'}
      </button>
      <NotificationsMenu/>
      <div className="topbar-right">
        <button className="mobile-search-btn" onClick={() => { const q = prompt(t('search_placeholder')); if (q && onSearch) onSearch(q); }}>
          <Icons.Search size={16}/>
        </button>
        <div className="user-chip" style={{cursor: 'pointer'}} onClick={() => { if (confirm('로그아웃 하시겠습니까?')) auth.logout(); }} title={userName || 'User'}>
          <div className="avatar"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
          {userName && <div className="user-chip-label">{userName}</div>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
